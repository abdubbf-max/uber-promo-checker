name: Check UberEats Promos

on:
  schedule:
    - cron: '0 */4 * * *'   # Toutes les 4 heures
  workflow_dispatch:          # Bouton "Run workflow" manuel sur GitHub

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Run promo checker
        working-directory: scripts
        run: node index.js
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          CF_BASE_COOKIES: ${{ secrets.CF_BASE_COOKIES }}
          COOKIES_JSON: ${{ secrets.COOKIES_JSON }}

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add promos.json
          git diff --staged --quiet && echo "Aucun changement" || (
            git pull --rebase origin main
            git push
          )
          git diff --staged --quiet && echo "Aucun changement" || (
            git commit -m "promos: update $(date -u '+%Y-%m-%d %H:%M') UTC"
            git push
          )

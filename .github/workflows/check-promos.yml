name: Check UberEats Promos

on:
  schedule:
    - cron: '0 */4 * * *'   # 00h, 04h, 08h, 12h, 16h, 20h UTC
  workflow_dispatch:          # Bouton manuel sur GitHub

permissions:
  contents: write

jobs:
  check:
    # Runner installé sur ton PC = vraie IP = pas bloqué par Uber
    runs-on: self-hosted
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # clone complet = pas de conflit rebase

      - name: Installer les dépendances
        working-directory: scripts
        run: npm install

      - name: Vérifier les promos
        working-directory: scripts
        run: node index.js
        env:
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}

      - name: Commit et push promos.json
        shell: pwsh
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add promos.json
          $staged = & git diff --staged --quiet; $changed = ($LASTEXITCODE -ne 0)

          if ($changed) {
            $ts = Get-Date -Format "yyyy-MM-dd HH:mm"
            git commit -m "promos: update $ts UTC"
            # Récupérer les éventuels changements distants avant de pousser
            git pull --rebase origin main
            git push origin main
            Write-Host "✅ promos.json poussé sur GitHub"
          } else {
            Write-Host "Aucun changement à committer"
          }
